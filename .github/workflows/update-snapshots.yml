name: Update Playwright Snapshots

# Manually-dispatched snapshot refresh. Runs the e2e suite with
# --update-snapshots on the Linux runner (the same env CI compares
# against) and commits the regenerated *-chromium-linux.png baselines
# back to the branch it was dispatched on.
#
# Why this exists: chromium-linux snapshots cannot be regenerated on a
# macOS dev machine without Docker. Before this workflow the linux
# baseline drifted (e.g. postfx-beauty went stale at the P5→P6-W7 layout
# change and was only caught once e2e actually ran in CI — see #74).
# Dispatch this whenever a deliberate visual change makes a snapshot
# diff expected.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      # --update-snapshots rewrites mismatched baselines; the run itself
      # then "passes". `|| true` so a genuinely new baseline (no prior
      # file) doesn't fail the step before the commit.
      - run: npx playwright test --update-snapshots || true
      - name: Commit regenerated snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- tests; then
            echo "No snapshot changes — nothing to commit."
            exit 0
          fi
          git add tests
          git commit -m "🤖 chore(e2e): regenerate Playwright chromium-linux snapshots

          Auto-generated by the update-snapshots workflow on
          ${{ github.ref_name }}. Review the image diff before merging."
          git push origin HEAD:${{ github.ref_name }}
